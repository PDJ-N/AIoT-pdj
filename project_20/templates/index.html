<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LED Control</title>
    <style>
      :root {
        --bg-top: #f3efe7;
        --bg-bottom: #d9e5df;
        --panel: rgba(255, 255, 255, 0.88);
        --shadow: 0 24px 50px rgba(30, 48, 40, 0.16);
        --on-start: #18734b;
        --on-end: #2db879;
        --off-start: #b5442c;
        --off-end: #e46749;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.84), transparent 34%),
          linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      }

      .panel {
        width: min(100%, 420px);
        padding: 24px;
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .controls {
        display: grid;
        gap: 16px;
      }

      .button {
        border: 0;
        border-radius: 22px;
        padding: 22px 20px;
        color: #fff;
        font: inherit;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .button:hover {
        transform: translateY(-2px);
      }

      .button:active {
        transform: translateY(0);
      }

      .button-on {
        background: linear-gradient(135deg, var(--on-start), var(--on-end));
        box-shadow: 0 14px 28px rgba(24, 115, 75, 0.28);
      }

      .button-off {
        background: linear-gradient(135deg, var(--off-start), var(--off-end));
        box-shadow: 0 14px 28px rgba(181, 68, 44, 0.28);
      }
    </style>
  </head>
  <body>
    <form action="/data" method="post" class="panel controls">
      <button type="submit" class="button button-on" name="led" value="on">
        ON
      </button>
      <button type="submit" class="button button-off" name="led" value="off">
        OFF
      </button>
    </form>
  </body>
</html>
